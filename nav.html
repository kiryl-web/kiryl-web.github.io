<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indoor Route Guide</title>
  <style>
    :root {
      --pageBackground: #ffffff;
      --textColor: #171717;
      --mutedTextColor: #666666;
      --lineColor: #e7e7e7;
      --fieldBackground: #fafafa;
      --badgeBackground: rgba(255, 255, 255, 0.93);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }
    
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--pageBackground);
      color: var(--textColor);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.35;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 5mm 12px;
      border-bottom: 1px solid var(--lineColor);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      margin: 0 0 5px;
      color: var(--mutedTextColor);
      font-size: 0.76rem;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .fields {
      display: grid;
      gap: 10px;
    }

    .fieldWrap {
      position: relative;
    }

    select,
    input,
    .selectButton {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--lineColor);
      border-radius: 13px;
      background: var(--fieldBackground);
      color: var(--textColor);
      font: inherit;
      font-size: 1rem;
      padding: 0 42px 0 13px;
      outline: none;
    }

    select:focus,
    input:focus,
    .selectButton:focus {
      border-color: #999999;
      background: #ffffff;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #777777 50%),
        linear-gradient(135deg, #777777 50%, transparent 50%);
      background-position:
        calc(100% - 22px) 20px,
        calc(100% - 15px) 20px;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    .selectButton {
      display: block;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .selectButton.isEmpty {
      color: var(--mutedTextColor);
    }

    .clearButton {
      display: none;
      position: absolute;
      right: 7px;
      top: 26px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--mutedTextColor);
      font: inherit;
      font-size: 1.35rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .clearButton.isVisible { display: block; }
    .clearButton:active { background: var(--lineColor); }

    main { padding: 14px 0 40px; }

    .routeInfo,
    .hintBox {
      margin: 0 5mm 14px;
      padding: 11px 12px;
      border: 1px solid var(--lineColor);
      border-radius: 14px;
      background: #ffffff;
      color: var(--mutedTextColor);
      font-size: 0.92rem;
    }

    .routeInfo strong,
    .hintBox strong {
      display: block;
      margin-bottom: 3px;
      color: var(--textColor);
      font-size: 1rem;
    }

    .routeLine {
      margin-top: 4px;
    }

    .viewSwitch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .viewButton {
      min-height: 38px;
      border: 1px solid var(--lineColor);
      border-radius: 999px;
      background: var(--fieldBackground);
      color: var(--mutedTextColor);
      font: inherit;
      font-size: 0.92rem;
      font-weight: 650;
      cursor: pointer;
    }

    .viewButton.isActive {
      background: var(--textColor);
      color: #ffffff;
      border-color: var(--textColor);
    }

    .step { margin: 0 5mm 22px; }

    .imageBox {
      position: relative;
      overflow: hidden;
      width: 100%;
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .imageBox img {
      display: block;
      width: 100%;
      height: auto;
      background: #ffffff;
    }

    .distanceTag {
      position: absolute;
      right: 9px;
      bottom: 9px;
      min-width: 54px;
      padding: 5px 9px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      background: var(--badgeBackground);
      color: var(--textColor);
      font-size: 0.84rem;
      font-weight: 750;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .description { margin: 9px 2px 0; font-size: 1rem; }

    .iterativeStep {
      margin: 0 5mm 22px;
      touch-action: pan-y;
      user-select: none;
    }

    .iterativeStep .imageBox img {
      transform-origin: 0 0;
      will-change: transform;
      touch-action: none;
    }

    .progressText {
      margin: 0 5mm 10px;
      color: var(--mutedTextColor);
      font-size: 0.92rem;
      text-align: center;
    }

    .swipeHint {
      margin: 10px 5mm 0;
      color: var(--mutedTextColor);
      font-size: 0.9rem;
      text-align: center;
    }

    .navArrow {
      position: absolute;
      z-index: 2;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      background: var(--badgeBackground);
      color: var(--textColor);
      font: inherit;
      font-size: 2.9rem;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      cursor: pointer;
    }

    .navArrow:disabled { opacity: 0.35; }

    .navArrowLeft {
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
    }

    .navArrowRight {
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
    }

    .emptyState,
    .errorState {
      margin: 24px 5mm;
      color: var(--mutedTextColor);
      font-size: 0.96rem;
    }

    .errorState { color: #8a1f11; }

    .pickerPage {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: auto;
      background: var(--pageBackground);
    }

    .pickerPage.isVisible { display: block; }

    .pickerHeader {
      position: sticky;
      top: 0;
      z-index: 101;
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 8px;
      padding: 12px 5mm 10px;
      border-bottom: 1px solid var(--lineColor);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
    }

    .backButton {
      width: 42px;
      height: 42px;
      border: 1px solid var(--lineColor);
      border-radius: 999px;
      background: var(--fieldBackground);
      color: var(--textColor);
      font: inherit;
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
    }

    .pickerTitle {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .pickerSearchWrap {
      position: sticky;
      top: 65px;
      z-index: 100;
      padding: 10px 5mm;
      border-bottom: 1px solid var(--lineColor);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
    }

    .pickerSearch {
      padding-right: 13px;
    }

    .pickerContent {
      padding: 8px 5mm 32px;
    }

    .categoryGroup {
      margin: 0 0 16px;
    }

    .categoryTitle {
      margin: 12px 0 7px;
      color: var(--mutedTextColor);
      font-size: 0.76rem;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .optionButton {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--lineColor);
      border-radius: 13px;
      background: #ffffff;
      color: var(--textColor);
      font: inherit;
      padding: 10px 11px;
      text-align: left;
      cursor: pointer;
    }

    .optionButton + .optionButton {
      margin-top: 7px;
    }

    .optionButton:active {
      background: var(--fieldBackground);
    }

    .optionText {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .optionMeta {
      color: var(--mutedTextColor);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    @media (min-width: 760px) {
      header,
      main,
      .pickerHeader,
      .pickerSearchWrap,
      .pickerContent {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }

      .fields { grid-template-columns: 1fr 1fr; }
      .stationField { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Indoor Route Guide</h1>
    <div class="fields">
      <div class="fieldWrap stationField">
        <label for="stationSelect">Train station</label>
        <select id="stationSelect" disabled>
          <option>Loading...</option>
        </select>
      </div>
      <div class="fieldWrap">
        <label for="startSelectButton">Start</label>
        <button class="selectButton isEmpty" id="startSelectButton" type="button">Choose start</button>
        <button class="clearButton" id="startClearButton" type="button" aria-label="Clear start">×</button>
      </div>
      <div class="fieldWrap">
        <label for="endSelectButton">Destination</label>
        <button class="selectButton isEmpty" id="endSelectButton" type="button">Choose destination</button>
        <button class="clearButton" id="endClearButton" type="button" aria-label="Clear destination">×</button>
      </div>
    </div>
  </header>

  <main id="routeArea">
    <p class="emptyState">Loading route data...</p>
  </main>

  <section class="pickerPage" id="pickerPage" aria-hidden="true">
    <div class="pickerHeader">
      <button class="backButton" id="pickerBackButton" type="button" aria-label="Back">‹</button>
      <h2 class="pickerTitle" id="pickerTitle">Choose</h2>
    </div>
    <div class="pickerSearchWrap">
      <label for="pickerSearch">Search</label>
      <input class="pickerSearch" id="pickerSearch" autocomplete="off" placeholder="Type platform, line, place, or service">
    </div>
    <div class="pickerContent" id="pickerContent"></div>
  </section>

  <script>
    var routeData = null;
    var selectedStationIndex = 0;
    var selectedStartValue = "";
    var selectedEndValue = "";
    var activePickerMode = "start";
    var currentViewMode = "sequential";
    var currentStepIndex = 0;
    var touchStartX = 0;
    var touchStartY = 0;
    var iterativeImage = null;
    var iterativeDistanceTag = null;
    var iterativeDescription = null;
    var iterativeProgressText = null;
    var iterativePreviousButton = null;
    var iterativeNextButton = null;
    var currentImageZoom = 1;
    var currentImagePanX = 0;
    var currentImagePanY = 0;
    var pinchStartDistance = 0;
    var pinchStartZoom = 1;
    var panStartX = 0;
    var panStartY = 0;
    var panStartImageX = 0;
    var panStartImageY = 0;
    var isPinchingImage = false;
    var isPanningImage = false;

    var defaultCategoryEncoding = {
      r: "Rail",
      t: "Tram",
      b: "Bus",
      c: "Connection",
      p: "Place",
      s: "Special"
    };

    var categoryTitles = {
      r: "Rail / Platforms",
      t: "Trams",
      b: "Buses",
      c: "Connections",
      p: "Places",
      s: "Special",
      x: "Other"
    };

    var categoryShortNames = {
      r: "Rail",
      t: "Tram",
      b: "Bus",
      c: "Connection",
      p: "Place",
      s: "Special",
      x: "Other"
    };

    var categoryOrder = ["c", "r", "t", "b", "p", "s", "x"];

    var stationSelect = document.getElementById("stationSelect");
    var startSelectButton = document.getElementById("startSelectButton");
    var endSelectButton = document.getElementById("endSelectButton");
    var startClearButton = document.getElementById("startClearButton");
    var endClearButton = document.getElementById("endClearButton");
    var routeArea = document.getElementById("routeArea");
    var pickerPage = document.getElementById("pickerPage");
    var pickerBackButton = document.getElementById("pickerBackButton");
    var pickerTitle = document.getElementById("pickerTitle");
    var pickerSearch = document.getElementById("pickerSearch");
    var pickerContent = document.getElementById("pickerContent");

    function getEncoding() {
      if (routeData && routeData.categoryEncoding) {
        return routeData.categoryEncoding;
      }
      return defaultCategoryEncoding;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normaliseData(data) {
      var normalisedData = data;
      if (data && data.stations && data.stations.length) {
        return data;
      }
      if (data && data.routes && data.routes.length) {
        normalisedData = {
          schemaVersion: 1,
          categoryEncoding: defaultCategoryEncoding,
          stations: [
            {
              id: "default-station",
              name: data.station || "Station",
              routes: data.routes
            }
          ]
        };
        return normalisedData;
      }
      throw new Error("data.json has no stations array and no routes array.");
    }

    function getCurrentStation() {
      if (!routeData || !routeData.stations || !routeData.stations.length) {
        return null;
      }
      if (selectedStationIndex < 0) {
        selectedStationIndex = 0;
      }
      if (selectedStationIndex >= routeData.stations.length) {
        selectedStationIndex = 0;
      }
      return routeData.stations[selectedStationIndex];
    }

    function getCurrentRoutes() {
      var station = getCurrentStation();
      if (!station || !station.routes) {
        return [];
      }
      return station.routes;
    }

    function getCategoryCode(value) {
      var text = String(value || "");
      var firstLetter = text.charAt(0);
      var encoding = getEncoding();
      if (firstLetter && encoding[firstLetter]) {
        return firstLetter;
      }
      return "x";
    }

    function getCategoryTitle(code) {
      if (categoryTitles[code]) {
        return categoryTitles[code];
      }
      return categoryTitles.x;
    }

    function getCategoryShortName(code) {
      if (categoryShortNames[code]) {
        return categoryShortNames[code];
      }
      return categoryShortNames.x;
    }

    function getDisplayValue(value) {
      var text = String(value || "");
      var code = getCategoryCode(text);
      if (code !== "x") {
        return text.substring(1);
      }
      return text;
    }

    function valueMatches(values, selectedValue) {
      var wantedValue = String(selectedValue || "").trim().toLowerCase();
      for (var index = 0; index < values.length; index = index + 1) {
        if (String(values[index]).trim().toLowerCase() === wantedValue) {
          return true;
        }
      }
      return false;
    }

    function routeHasStart(route, value) {
      var values = [];
      values = values.concat(route.startLocations || []);
      values = values.concat(route.connectionsFrom || []);
      return valueMatches(values, value);
    }

    function routeHasEnd(route, value) {
      var values = [];
      values = values.concat(route.endLocations || []);
      values = values.concat(route.connectionsTo || []);
      return valueMatches(values, value);
    }

    function getRouteMatchScore(route, startValue, endValue) {
      var score = 0;
      if (valueMatches(route.startLocations || [], startValue)) {
        score = score + 4;
      }
      if (valueMatches(route.endLocations || [], endValue)) {
        score = score + 4;
      }
      if (valueMatches(route.connectionsFrom || [], startValue)) {
        score = score + 2;
      }
      if (valueMatches(route.connectionsTo || [], endValue)) {
        score = score + 2;
      }
      return score;
    }

    function findRoute(startValue, endValue) {
      var routes = getCurrentRoutes();
      var bestRoute = null;
      var bestScore = -1;
      var score;
      for (var index = 0; index < routes.length; index = index + 1) {
        if (routeHasStart(routes[index], startValue) && routeHasEnd(routes[index], endValue)) {
          score = getRouteMatchScore(routes[index], startValue, endValue);
          if (score > bestScore) {
            bestRoute = routes[index];
            bestScore = score;
          }
        }
      }
      return bestRoute;
    }

    function sortValues(values) {
      return values.sort(function (firstValue, secondValue) {
        return getDisplayValue(firstValue).localeCompare(getDisplayValue(secondValue), undefined, { sensitivity: "base", numeric: true });
      });
    }

    function uniqueValues(values) {
      var seenValues = {};
      var resultValues = [];
      var value;
      var key;
      for (var index = 0; index < values.length; index = index + 1) {
        value = String(values[index]);
        key = value.trim().toLowerCase();
        if (key && !seenValues[key]) {
          seenValues[key] = true;
          resultValues.push(value);
        }
      }
      return sortValues(resultValues);
    }

    function getCandidateValues(mode) {
      var routes = getCurrentRoutes();
      var values = [];
      var route;
      for (var routeIndex = 0; routeIndex < routes.length; routeIndex = routeIndex + 1) {
        route = routes[routeIndex];
        if (mode === "start") {
          if (!selectedEndValue || routeHasEnd(route, selectedEndValue)) {
            values = values.concat(route.startLocations || []);
            values = values.concat(route.connectionsFrom || []);
          }
        } else {
          if (!selectedStartValue || routeHasStart(route, selectedStartValue)) {
            values = values.concat(route.endLocations || []);
            values = values.concat(route.connectionsTo || []);
          }
        }
      }
      return uniqueValues(values);
    }

    function valuePassesSearch(value, searchText) {
      var text = String(searchText || "").trim().toLowerCase();
      var displayValue = getDisplayValue(value).toLowerCase();
      var rawValue = String(value || "").toLowerCase();
      var categoryValue = getCategoryTitle(getCategoryCode(value)).toLowerCase();
      if (!text) {
        return true;
      }
      if (displayValue.indexOf(text) !== -1) {
        return true;
      }
      if (rawValue.indexOf(text) !== -1) {
        return true;
      }
      if (categoryValue.indexOf(text) !== -1) {
        return true;
      }
      return false;
    }

    function valuesForCategory(values, code, searchText) {
      var resultValues = [];
      for (var index = 0; index < values.length; index = index + 1) {
        if (getCategoryCode(values[index]) === code && valuePassesSearch(values[index], searchText)) {
          resultValues.push(values[index]);
        }
      }
      return sortValues(resultValues);
    }

    function formatValueList(values) {
      var resultText = "";
      for (var index = 0; index < values.length; index = index + 1) {
        if (index > 0) {
          resultText = resultText + " / ";
        }
        resultText = resultText + getDisplayValue(values[index]);
      }
      if (!resultText) {
        return "Not specified";
      }
      return resultText;
    }

    function updateSelectorButtons() {
      if (selectedStartValue) {
        startSelectButton.textContent = getDisplayValue(selectedStartValue);
        startSelectButton.classList.remove("isEmpty");
        startClearButton.classList.add("isVisible");
      } else {
        startSelectButton.textContent = "Choose start";
        startSelectButton.classList.add("isEmpty");
        startClearButton.classList.remove("isVisible");
      }

      if (selectedEndValue) {
        endSelectButton.textContent = getDisplayValue(selectedEndValue);
        endSelectButton.classList.remove("isEmpty");
        endClearButton.classList.add("isVisible");
      } else {
        endSelectButton.textContent = "Choose destination";
        endSelectButton.classList.add("isEmpty");
        endClearButton.classList.remove("isVisible");
      }
    }

    function fillStationSelect() {
      var option;
      var station;
      stationSelect.innerHTML = "";
      for (var index = 0; index < routeData.stations.length; index = index + 1) {
        station = routeData.stations[index];
        option = document.createElement("option");
        option.value = String(index);
        option.textContent = station.name || station.id || "Station";
        if (station.isMock) {
          option.textContent = option.textContent + " (mock)";
        }
        stationSelect.appendChild(option);
      }
      stationSelect.disabled = false;
      stationSelect.value = String(selectedStationIndex);
    }

    function createOptionButton(value) {
      var button = document.createElement("button");
      var textSpan = document.createElement("span");
      var metaSpan = document.createElement("span");
      var code = getCategoryCode(value);

      button.type = "button";
      button.className = "optionButton";
      textSpan.className = "optionText";
      metaSpan.className = "optionMeta";
      textSpan.textContent = getDisplayValue(value);
      metaSpan.textContent = getCategoryShortName(code);

      button.appendChild(textSpan);
      button.appendChild(metaSpan);
      button.addEventListener("click", function () {
        selectPickerValue(value);
      });
      return button;
    }

    function renderPickerOptions() {
      var values = getCandidateValues(activePickerMode);
      var searchText = pickerSearch.value;
      var hasAnyOption = false;
      var group;
      var groupTitle;
      var groupValues;
      var optionButton;

      pickerContent.innerHTML = "";

      for (var categoryIndex = 0; categoryIndex < categoryOrder.length; categoryIndex = categoryIndex + 1) {
        groupValues = valuesForCategory(values, categoryOrder[categoryIndex], searchText);
        if (groupValues.length > 0) {
          hasAnyOption = true;
          group = document.createElement("section");
          group.className = "categoryGroup";
          groupTitle = document.createElement("h3");
          groupTitle.className = "categoryTitle";
          groupTitle.textContent = getCategoryTitle(categoryOrder[categoryIndex]);
          group.appendChild(groupTitle);

          for (var valueIndex = 0; valueIndex < groupValues.length; valueIndex = valueIndex + 1) {
            optionButton = createOptionButton(groupValues[valueIndex]);
            group.appendChild(optionButton);
          }

          pickerContent.appendChild(group);
        }
      }

      if (!hasAnyOption) {
        pickerContent.innerHTML = '<p class="emptyState">No matching options.</p>';
      }
    }

    function openPicker(mode) {
      activePickerMode = mode;
      if (mode === "start") {
        pickerTitle.textContent = "Choose start";
      } else {
        pickerTitle.textContent = "Choose destination";
      }
      pickerSearch.value = "";
      renderPickerOptions();
      pickerPage.classList.add("isVisible");
      pickerPage.setAttribute("aria-hidden", "false");
      pickerPage.scrollTop = 0;
      pickerSearch.focus();
    }

    function closePicker() {
      pickerPage.classList.remove("isVisible");
      pickerPage.setAttribute("aria-hidden", "true");
    }

    function selectPickerValue(value) {
      if (activePickerMode === "start") {
        selectedStartValue = value;
      } else {
        selectedEndValue = value;
      }
      currentStepIndex = 0;
      resetIterativeZoom();
      closePicker();
      updatePage();
    }

    function clearSelection(mode) {
      if (mode === "start") {
        selectedStartValue = "";
      } else {
        selectedEndValue = "";
      }
      currentStepIndex = 0;
      resetIterativeZoom();
      updatePage();
    }

    function formatDistance(distanceM) {
      var distanceNumber = Number(distanceM);
      if (!isFinite(distanceNumber)) {
        return "0 m";
      }
      if (distanceNumber % 1 === 0) {
        return distanceNumber.toFixed(0) + " m";
      }
      return distanceNumber.toFixed(1) + " m";
    }

    function formatWalkingMinutes(distanceM) {
      var distanceNumber = Number(distanceM);
      var minutes = distanceNumber / 50;
      if (!isFinite(minutes) || minutes < 0) {
        return "0 min";
      }
      if (minutes < 1 && minutes > 0) {
        return "< 1 min";
      }
      return Math.round(minutes) + " min";
    }

    function getImageSource(route, step) {
      var imagePath = String(step.image || "");
      var imageFolder = String(route.imageFolder || "");

      if (!imagePath) {
        return "";
      }

      if (imagePath.indexOf("/") !== -1 || imagePath.indexOf("\\") !== -1) {
        return imagePath;
      }

      if (imageFolder) {
        return imageFolder + "/" + imagePath;
      }

      return imagePath;
    }

    function renderRouteInfo(route) {
      var routeInfo = document.createElement("section");
      var sequentialActive = currentViewMode === "sequential" ? " isActive" : "";
      var iterativeActive = currentViewMode === "iterative" ? " isActive" : "";
      var chosenText = getDisplayValue(selectedStartValue) + " → " + getDisplayValue(selectedEndValue);
      var physicalText = formatValueList(route.startLocations || []) + " → " + formatValueList(route.endLocations || []);

      routeInfo.className = "routeInfo";
      routeInfo.innerHTML =
        "<strong>Selected route</strong>" +
        '<div class="routeLine">Chosen: ' + escapeHtml(chosenText) + "</div>" +
        '<div class="routeLine">Physical route: ' + escapeHtml(physicalText) + "</div>" +
        '<div class="routeLine">Total distance: ' + escapeHtml(formatDistance(route.estimatedDistanceM || 0)) +
        " · Walking time at 3 km/h: " + escapeHtml(formatWalkingMinutes(route.estimatedDistanceM || 0)) + "</div>" +
        '<div class="viewSwitch">' +
        '<button class="viewButton' + sequentialActive + '" type="button" data-view-mode="sequential">Sequential</button>' +
        '<button class="viewButton' + iterativeActive + '" type="button" data-view-mode="iterative">Iterative</button>' +
        "</div>";

      routeArea.appendChild(routeInfo);

      var buttons = routeInfo.querySelectorAll(".viewButton");
      for (var index = 0; index < buttons.length; index = index + 1) {
        buttons[index].addEventListener("click", function () {
          currentViewMode = this.getAttribute("data-view-mode") || "sequential";
          renderRoute();
        });
      }
    }

    function createStepElement(route, step, isIterative) {
      var stepElement = document.createElement("section");
      var imageBox = document.createElement("div");
      var image = document.createElement("img");
      var distanceTag = document.createElement("div");
      var description = document.createElement("p");

      stepElement.className = isIterative ? "iterativeStep" : "step";
      imageBox.className = "imageBox";
      distanceTag.className = "distanceTag";
      description.className = "description";

      image.src = getImageSource(route, step);
      image.alt = step.description || "Route step";
      image.loading = "lazy";

      distanceTag.textContent = formatDistance(step.distanceM);
      distanceTag.setAttribute("data-distance-m", String(Number(step.distanceM) || 0));
      description.textContent = step.description || "";

      imageBox.appendChild(image);
      imageBox.appendChild(distanceTag);
      stepElement.appendChild(imageBox);
      stepElement.appendChild(description);
      return stepElement;
    }

    function clearIterativeReferences() {
      iterativeImage = null;
      iterativeDistanceTag = null;
      iterativeDescription = null;
      iterativeProgressText = null;
      iterativePreviousButton = null;
      iterativeNextButton = null;
    }

    function resetIterativeZoom() {
      currentImageZoom = 1;
      currentImagePanX = 0;
      currentImagePanY = 0;
      applyIterativeImageTransform();
    }

    function getTouchDistance(firstTouch, secondTouch) {
      var deltaX = firstTouch.clientX - secondTouch.clientX;
      var deltaY = firstTouch.clientY - secondTouch.clientY;
      return Math.sqrt(deltaX * deltaX + deltaY * deltaY);
    }

    function applyIterativeImageTransform() {
      if (!iterativeImage) {
        return;
      }

      if (currentImageZoom <= 1) {
        currentImageZoom = 1;
        currentImagePanX = 0;
        currentImagePanY = 0;
      }

      iterativeImage.style.transform = "translate(" + currentImagePanX + "px, " + currentImagePanY + "px) scale(" + currentImageZoom + ")";
    }

    function updateIterativeStepContent() {
      var route = findRoute(selectedStartValue, selectedEndValue);
      var steps = route ? route.steps || [] : [];
      var step;

      if (!steps.length) {
        return;
      }

      if (currentStepIndex < 0) {
        currentStepIndex = 0;
      }
      if (currentStepIndex >= steps.length) {
        currentStepIndex = steps.length - 1;
      }

      step = steps[currentStepIndex];

      if (iterativeProgressText) {
        iterativeProgressText.textContent = "Step " + String(currentStepIndex + 1) + " of " + String(steps.length);
      }
      if (iterativeImage) {
        iterativeImage.src = getImageSource(route, step);
        iterativeImage.alt = step.description || "Route step";
        applyIterativeImageTransform();
      }
      if (iterativeDistanceTag) {
        iterativeDistanceTag.textContent = formatDistance(step.distanceM);
        iterativeDistanceTag.setAttribute("data-distance-m", String(Number(step.distanceM) || 0));
      }
      if (iterativeDescription) {
        iterativeDescription.textContent = step.description || "";
      }
      if (iterativePreviousButton) {
        iterativePreviousButton.disabled = currentStepIndex === 0;
      }
      if (iterativeNextButton) {
        iterativeNextButton.disabled = currentStepIndex === steps.length - 1;
      }
    }

    function changeIterativeStep(stepChange) {
      var route = findRoute(selectedStartValue, selectedEndValue);
      var steps = route ? route.steps || [] : [];
      var nextIndex = currentStepIndex + stepChange;

      if (!steps.length) {
        return;
      }
      if (nextIndex < 0) {
        nextIndex = 0;
      }
      if (nextIndex >= steps.length) {
        nextIndex = steps.length - 1;
      }
      if (nextIndex !== currentStepIndex) {
        currentStepIndex = nextIndex;
        updateIterativeStepContent();
      }
    }

    function addArrowButton(imageBox, className, text, stepChange, disabled) {
      var button = document.createElement("button");
      button.type = "button";
      button.className = "navArrow " + className;
      button.textContent = text;
      button.disabled = disabled;
      button.addEventListener("click", function () {
        changeIterativeStep(stepChange);
      });
      imageBox.appendChild(button);
      return button;
    }

    function renderSequentialView(route) {
      var steps = route.steps || [];
      if (!steps.length) {
        routeArea.innerHTML += '<p class="emptyState">This route has no steps yet.</p>';
        return;
      }
      for (var index = 0; index < steps.length; index = index + 1) {
        routeArea.appendChild(createStepElement(route, steps[index], false));
      }
    }

    function renderIterativeView(route) {
      var steps = route.steps || [];
      var stepElement;
      var imageBox;
      var progressText;
      var swipeHint;

      if (!steps.length) {
        routeArea.innerHTML += '<p class="emptyState">This route has no steps yet.</p>';
        return;
      }

      if (currentStepIndex < 0) {
        currentStepIndex = 0;
      }
      if (currentStepIndex >= steps.length) {
        currentStepIndex = steps.length - 1;
      }

      progressText = document.createElement("p");
      progressText.className = "progressText";
      progressText.textContent = "Step " + String(currentStepIndex + 1) + " of " + String(steps.length);
      iterativeProgressText = progressText;
      routeArea.appendChild(progressText);

      stepElement = createStepElement(route, steps[currentStepIndex], true);
      imageBox = stepElement.querySelector(".imageBox");
      iterativeImage = stepElement.querySelector("img");
      iterativeDistanceTag = stepElement.querySelector(".distanceTag");
      iterativeDescription = stepElement.querySelector(".description");

      iterativePreviousButton = addArrowButton(imageBox, "navArrowLeft", "‹", -1, currentStepIndex === 0);
      iterativeNextButton = addArrowButton(imageBox, "navArrowRight", "›", 1, currentStepIndex === steps.length - 1);

      applyIterativeImageTransform();

      imageBox.addEventListener("touchstart", function (event) {
        if (event.touches.length === 2) {
          isPinchingImage = true;
          isPanningImage = false;
          pinchStartDistance = getTouchDistance(event.touches[0], event.touches[1]);
          pinchStartZoom = currentImageZoom;
          event.preventDefault();
          return;
        }

        if (event.touches.length === 1) {
          touchStartX = event.touches[0].clientX;
          touchStartY = event.touches[0].clientY;
          panStartX = event.touches[0].clientX;
          panStartY = event.touches[0].clientY;
          panStartImageX = currentImagePanX;
          panStartImageY = currentImagePanY;
          isPanningImage = currentImageZoom > 1;
        }
      }, { passive: false });

      imageBox.addEventListener("touchmove", function (event) {
        var distance;
        var nextZoom;

        if (event.touches.length === 2 && isPinchingImage) {
          distance = getTouchDistance(event.touches[0], event.touches[1]);
          if (pinchStartDistance > 0) {
            nextZoom = pinchStartZoom * distance / pinchStartDistance;
            if (nextZoom < 1) {
              nextZoom = 1;
            }
            if (nextZoom > 4) {
              nextZoom = 4;
            }
            currentImageZoom = nextZoom;
            applyIterativeImageTransform();
          }
          event.preventDefault();
          return;
        }

        if (event.touches.length === 1 && isPanningImage) {
          currentImagePanX = panStartImageX + event.touches[0].clientX - panStartX;
          currentImagePanY = panStartImageY + event.touches[0].clientY - panStartY;
          applyIterativeImageTransform();
          event.preventDefault();
        }
      }, { passive: false });

      imageBox.addEventListener("touchend", function (event) {
        var touchEndX;
        var deltaX;

        if (event.touches.length === 0) {
          isPinchingImage = false;
          isPanningImage = false;
        }

        if (currentImageZoom > 1) {
          return;
        }

        if (!event.changedTouches.length) {
          return;
        }

        touchEndX = event.changedTouches[0].clientX;
        deltaX = touchEndX - touchStartX;

        if (Math.abs(deltaX) < 35) {
          return;
        }

        if (deltaX > 0) {
          changeIterativeStep(1);
        } else {
          changeIterativeStep(-1);
        }
      }, { passive: true });

      imageBox.addEventListener("dblclick", function () {
        resetIterativeZoom();
      });

      routeArea.appendChild(stepElement);

      swipeHint = document.createElement("p");
      swipeHint.className = "swipeHint";
      swipeHint.textContent = "Swipe right for next. Swipe left for previous. Pinch to zoom; double-tap/click to reset zoom.";
      routeArea.appendChild(swipeHint);
    }

    function renderRoute() {
      var route;
      if (!routeData) {
        routeArea.innerHTML = '<p class="emptyState">Loading route data...</p>';
        return;
      }

      if (!selectedStartValue || !selectedEndValue) {
        routeArea.innerHTML = '<section class="hintBox"><strong>Choose a route</strong>Select a station, then choose a start and destination. Start and destination can be platforms, trams, buses, places, special stops, or train connections.</section>';
        return;
      }

      route = findRoute(selectedStartValue, selectedEndValue);
      if (!route) {
        routeArea.innerHTML = '<p class="emptyState">No route found for this combination.</p>';
        return;
      }

      routeArea.innerHTML = "";
      clearIterativeReferences();
      renderRouteInfo(route);

      if (currentViewMode === "iterative") {
        renderIterativeView(route);
      } else {
        renderSequentialView(route);
      }
    }

    function updatePage() {
      updateSelectorButtons();
      renderRoute();
    }

    function initialisePage(data) {
      routeData = normaliseData(data);
      selectedStationIndex = 0;
      selectedStartValue = "";
      selectedEndValue = "";
      fillStationSelect();
      updatePage();
    }

    function showLoadError(message) {
      stationSelect.innerHTML = "";
      stationSelect.disabled = true;
      routeArea.innerHTML = '<p class="errorState">' + escapeHtml(message) + '</p>';
    }

    stationSelect.addEventListener("change", function () {
      selectedStationIndex = Number(stationSelect.value) || 0;
      selectedStartValue = "";
      selectedEndValue = "";
      currentStepIndex = 0;
      resetIterativeZoom();
      updatePage();
    });

    startSelectButton.addEventListener("click", function () {
      openPicker("start");
    });

    endSelectButton.addEventListener("click", function () {
      openPicker("end");
    });

    startClearButton.addEventListener("click", function (event) {
      event.stopPropagation();
      clearSelection("start");
    });

    endClearButton.addEventListener("click", function (event) {
      event.stopPropagation();
      clearSelection("end");
    });

    pickerBackButton.addEventListener("click", function () {
      closePicker();
    });

    pickerSearch.addEventListener("input", function () {
      renderPickerOptions();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && pickerPage.classList.contains("isVisible")) {
        closePicker();
      }
    });

    fetch("data.json", { cache: "no-store" })
      .then(function (response) {
        if (!response.ok) {
          throw new Error("data.json was not found next to this HTML file.");
        }
        return response.json();
      })
      .then(initialisePage)
      .catch(function (error) {
        showLoadError(error.message || "data.json could not be loaded.");
      });
  </script>
</body>
</html>
