<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Meditation Exercise</title>
</head>
<body>
  <div id="background">
    <div id="card">
      <!-- SVG outline -->
      <svg id="outline" viewBox="0 0 160 160">
        <rect
          id="progress-rect"
          x="5" y="5" width="150" height="150"
          fill="none"
          stroke-width="10"
          stroke="#FF4081"
          stroke-linecap="round"
          pathLength="1"
          stroke-dasharray="1"
          stroke-dashoffset="1"
        />
      </svg>
      <!-- Centered breathing text -->
      <div id="breath-text">Inhale</div>
    </div>
    <div id="iteration-text">Breaths left: 12</div>
    <button id="pause-button">Pause</button>
    <div id="pause-overlay" class="hidden">
      <button id="resume-button">Resume</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
