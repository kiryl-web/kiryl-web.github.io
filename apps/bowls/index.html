<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="..\..\style.css">
    <title>Bowls</title>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">

    <style>
        .label {
            display: block;
            margin-bottom: 0.5cm;
        }

        .row {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
        }

        #startBtn {
            width: 50%;
            padding: 0.6cm 0;
            font-size: 0.5cm;
            font-family: 'Times New Roman', Times, serif;
        }

        /* timer */
        #timer {
            font-size: 0.6cm;
            margin-top: 0.6cm; 
        }
    </style>
</head>

<body style="min-height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column;">


    <button id="startBtn">Start to play notes</button>
    <div id="timer" aria-live="polite">00:00:00<div>

    <script>
        // Note list
        const paths = [
            'out/shift_05_+0st.wav',
            'out/shift_06_+3st.wav',
            'out/shift_07_+6st.wav',
            'out/shift_08_+9st.wav',
            'out/shift_09_+12st.wav',
            'out/shift_10_+15st.wav'
        ];

        const el = (id) => document.getElementById(id);
        const setStatus = (t) => { const s = document.getElementById('status'); if (s) s.textContent = t; };

        // --- timer state ---
        const tstate = {
            startedOnce: false,
            running: false,
            rafId: null,
            baseMs: 0,          // accumulated time when paused
            anchor: 0           // performance.now() at last resume
        };

function fmt(ms) {
    const total = Math.floor(ms);

    const h = Math.floor(total / 3600000);
    const m = Math.floor((total % 3600000) / 60000);
    const s = Math.floor((total % 60000) / 1000);
    const d = Math.floor((total % 1000) / 10);   // hundredths

    return (
        String(h).padStart(2,'0') + ':' +
        String(m).padStart(2,'0') + ':' +
        String(s).padStart(2,'0') 
        //+ '.' + String(d).padStart(2,'0')
    );
}


        function tick() {
            if (!tstate.running) return;
            const now = performance.now();
            const elapsed = tstate.baseMs + (now - tstate.anchor);
            el('timer').textContent = fmt(elapsed);
            tstate.rafId = requestAnimationFrame(tick);
        }

        function timerStartIfNeeded() {
            if (!tstate.startedOnce) {
                tstate.startedOnce = true;
            }
            if (!tstate.running) {
                tstate.running = true;
                tstate.anchor = performance.now();
                tstate.rafId = requestAnimationFrame(tick);
            }
        }

        function timerPause() {
            if (!tstate.running) return;
            tstate.running = false;
            cancelAnimationFrame(tstate.rafId);
            tstate.rafId = null;
            const now = performance.now();
            tstate.baseMs += (now - tstate.anchor);
            el('timer').textContent = fmt(tstate.baseMs);
        }

        const state = {
            pool: [],
            timer: null,
            started: false,
            audio: new Audio(),   // single voice => no overlap
            playing: false,
        };

        function shuffleFill() {
            state.pool = [...Array(paths.length).keys()];
            for (let i = state.pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [state.pool[i], state.pool[j]] = [state.pool[j], state.pool[i]];
            }
        }

        function nextIndex() {
            if (state.pool.length === 0) shuffleFill();
            return state.pool.pop();
        }

        // Base wait (seconds) = slider value. Always apply ±50% jitter around it.
        function effWait() {
            const s = el('freq'); // optional slider; safe if absent
            const base = 1;
            const factor = 0.5 + Math.random(); // uniform in [0.5, 1.5)
            return base * factor;
        }

        function clamp(val, lo, hi) { return Math.max(lo, Math.min(hi, val)); }

        function updateWaitDisplay(val) {
            const s = el('freq');
            if (!s) return;
            const lo = parseFloat(s.min) || 0.05, hi = parseFloat(s.max) || 2;
            const clamped = clamp(val, lo, hi);
            const v = el('freqVal'); if (v) v.textContent = clamped.toFixed(2);
        }

        function scheduleNext() {
            const w = effWait();
            if (state.timer) clearTimeout(state.timer);
            state.timer = setTimeout(() => { if (state.started) playOne(); }, w * 1000);
            setStatus && setStatus('running');
        }

        function playOne() {
            // No overlap: if something is already playing, wait for it to finish
            if (state.playing) return;

            const idx = nextIndex();
            const src = paths[idx];
            state.playing = true;

            state.audio.pause();
            state.audio.src = src;

            state.audio.onplay = () => {
                // ensure timer is running while sequence is active
                if (state.started) timerStartIfNeeded();
            };

            state.audio.onended = () => {
                state.playing = false;
                if (state.started) scheduleNext();
            };
            state.audio.onerror = () => {
                state.playing = false;
                if (state.started) scheduleNext();
            };

            state.audio.play().catch(() => {
                setStatus && setStatus('tap Start to play');
                state.playing = false;
            });
        }

        function start() {
            if (state.started) return;
            state.started = true;
            el('startBtn').textContent = 'Stop';
            // start timer on first run and keep it running while sequence is active
            timerStartIfNeeded();
            // kick off immediately; subsequent notes are scheduled
            playOne();
        }

        function stop() {
            if (!state.started) return;
            state.started = false;
            if (state.timer) clearTimeout(state.timer);
            state.audio.pause();
            el('startBtn').textContent = 'Start to play notes';
            setStatus && setStatus('stopped');
            // pause timer when the sound stops
            timerPause();
        }

        // --- UI bindings ---
        el('startBtn').addEventListener('click', () => {
            if (state.started) stop(); else start();
        });

        const freq = el('freq');
        if (freq) {
            freq.addEventListener('input', () => {
                updateWaitDisplay(parseFloat(freq.value));
                if (!state.started) start();
            });
        }

        // Initialize
        shuffleFill();
        updateWaitDisplay(freq ? parseFloat(freq.value) : 1);
    </script>
</body>

</html>
