<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Game</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0a0a2d;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="stage"></canvas>

    <script>
        (() => {

            const canvas = document.getElementById("stage");
            const ctx = canvas.getContext("2d", { alpha: false });
            ctx.imageSmoothingEnabled = false;

            const heli = {
                img: null,
                x: 40,
                y: 0,
                w: 0,
                h: 0,
                dragging: false,
                dragOffsetY: 0
            };

            function resizeCanvas() {
                const w = Math.floor(window.innerWidth);
                const h = Math.floor(window.innerHeight);
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = w + "px";
                canvas.style.height = h + "px";
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                // keep heli inside after resize
                if (heli.img) {
                    heli.y = clamp(heli.y, 0, canvas.height - heli.h);
                }
            }
            window.addEventListener("resize", resizeCanvas, { passive: true });
            resizeCanvas();

            const sources = ["b1.png", "b2.png", "b3.png", "b4.png", "b5.png"];
            const images = [];
            let loaded = 0;

            const buildings = [];

            function randInt(a, b) {
                return a + Math.floor(Math.random() * (b - a + 1));
            }
            function clamp(v, lo, hi) {
                if (v < lo) return lo;
                if (v > hi) return hi;
                return v;
            }

            let boost = false;


            function spawnBuilding() {
                if (images.length === 0) return;

                const img = images[randInt(0, images.length - 1)];

                const w = (img.naturalWidth || 80);
                const h = (img.naturalHeight || 160);

                const flip = randInt(0, 1) === 1;

                const y = canvas.height - h + randInt(0, 200);

                const x = canvas.width + randInt(0, canvas.width >> 2);

                const speed = randInt(1, 3);   // integer px/frame

                buildings.push({ img, x, y, w, h, speed, flip });
            }

            // integer spawn gap
            let framesLeft = 0;

            function maybeSpawn() {
                framesLeft--;
                if (framesLeft <= 0) {
                    spawnBuilding();
                    framesLeft = randInt(10, 100);
                }
            }

            window.addEventListener("keydown", e => {
                if (e.key === "ArrowRight") boost = true;
            });

            window.addEventListener("keyup", e => {
                if (e.key === "ArrowRight") boost = false;
            });


            function renderFrame() {
                ctx.fillStyle = "#0a0a2d";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // buildings update
                for (let i = buildings.length - 1; i >= 0; i--) {
                    const b = buildings[i];
                    //  b.x -= b.speed;
                    b.x -= (boost ? b.speed * 5 : b.speed);

                    if (b.x + b.w < 0) buildings.splice(i, 1);
                }

                buildings.sort((a, b) => a.speed - b.speed);

                for (const b of buildings) {
                    if (b.flip) {
                        ctx.save();
                        ctx.scale(-1, 1);
                        ctx.drawImage(b.img, -(b.x + b.w), b.y, b.w, b.h);
                        ctx.restore();
                    } else {
                        ctx.drawImage(b.img, b.x, b.y, b.w, b.h);
                    }
                }

                // helicopter draw last (on top)
                if (heli.img) {
                    ctx.drawImage(heli.img, heli.x, heli.y, heli.w, heli.h);
                }
            }

            function tick() {
                maybeSpawn();
                renderFrame();
                requestAnimationFrame(tick);
            }

            // pointer controls: vertical drag
            canvas.addEventListener("pointerdown", (e) => {
                if (!heli.img) return;
                const cx = Math.floor(e.clientX);
                const cy = Math.floor(e.clientY);
                if (cx >= heli.x && cx < heli.x + heli.w && cy >= heli.y && cy < heli.y + heli.h) {
                    heli.dragging = true;
                    heli.dragOffsetY = cy - heli.y;
                    canvas.setPointerCapture(e.pointerId);
                }
            });
            canvas.addEventListener("pointermove", (e) => {
                if (!heli.dragging) return;
                const cy = Math.floor(e.clientY);
                const newY = cy - heli.dragOffsetY;
                heli.y = clamp(newY, 0, canvas.height - heli.h);
            });
            canvas.addEventListener("pointerup", (e) => {
                if (heli.dragging) {
                    heli.dragging = false;
                    try { canvas.releasePointerCapture(e.pointerId); } catch (_) { }
                }
            });
            canvas.addEventListener("pointercancel", () => {
                heli.dragging = false;
            });

            // keyboard controls: ArrowUp/ArrowDown and +/- adjust Y
            const KEY_STEP = 10; // integer step
            window.addEventListener("keydown", (e) => {
                if (!heli.img) return;
                let dy = 0;
                if (e.key === "ArrowUp") dy = -KEY_STEP;
                else if (e.key === "ArrowDown") dy = KEY_STEP;
                else if (e.key === "+" || (e.key === "=" && e.shiftKey)) dy = -KEY_STEP; // plus
                else if (e.key === "-") dy = KEY_STEP; // minus
                if (dy !== 0) {
                    e.preventDefault();
                    heli.y = clamp(heli.y + dy, 0, canvas.height - heli.h);
                }
            });

            // load building images
            sources.forEach(src => {
                const img = new Image();
                img.onload = () => {
                    loaded++;
                    maybeStart();
                };
                img.src = src;
                images.push(img);
            });

            // load helicopter image
            const heliImg = new Image();
            heliImg.onload = () => {
                heli.img = heliImg;
                heli.w = heliImg.naturalWidth || 96;
                heli.h = heliImg.naturalHeight || 48;
                // start centered vertically
                heli.y = clamp((canvas.height >> 1) - (heli.h >> 1), 0, canvas.height - heli.h);
                // x stays 40
                loaded++;
                maybeStart();
            };
            heliImg.src = "helicopter.png";

            function maybeStart() {
                // wait for all building sources + heli
                if (loaded === sources.length + 1) {
                    spawnBuilding();
                    requestAnimationFrame(tick);
                }
            }



        })();
    </script>

</body>

</html>
